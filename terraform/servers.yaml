# ==============================================================
# servers.yaml — Developer Interface
# ==============================================================
# THIS IS THE ONLY FILE DEVELOPERS NEED TO EDIT.
#
# Add, modify, or remove entries in the `instances` list to
# manage EC2 instances.  After editing, run:
#
#   terraform plan   # preview changes
#   terraform apply  # apply changes
#
# --------------------------------------------------------------
# FIELD REFERENCE
# --------------------------------------------------------------
#
# name               (required) Unique identifier for this instance.
#                               Used as the Terraform resource key
#                               and the AWS Name tag.
#                               Allowed chars: lowercase a-z, 0-9, hyphens.
#                               Must not start or end with a hyphen.
#
# instance_type      (required) EC2 instance type.
#                               Examples: t3.micro, t3.medium, m5.xlarge
#
# volume_size        (required) Root EBS volume size in GB.
#                               Minimum: 8 GB.
#
# ami_id             (optional*) Direct AMI ID — bypasses data source lookup.
#                               Use when you need a specific or golden image.
#                               Example: ami-0c02fb55956c7d316
#
# ami_type           (optional*) OS family resolved to the latest AMI via
#                               data sources. Supported values:
#                                 ubuntu      → Ubuntu 22.04 LTS (latest)
#                                 amazonlinux → Amazon Linux 2 (latest)
#
#                    * One of ami_id or ami_type must be set per instance.
#
# associate_public_ip (optional) Assign a public IP address.
#                               Default: true
#
# user_data_file     (optional) Path to a bootstrap shell script,
#                               relative to the terraform/ directory.
#                               Example: scripts/jenkins.sh
#                               Omit to skip bootstrapping.
#
# additional_volumes (optional) Extra EBS data volumes to attach.
#   - device_name   (required)  Linux device path, e.g. /dev/xvdb
#     volume_size   (required)  Volume size in GB.
#     volume_type   (optional)  EBS type. Default: gp3
#
# --------------------------------------------------------------
# EXAMPLES
# --------------------------------------------------------------
#
# Using a specific AMI ID:
#   - name: api-server
#     instance_type: t3.medium
#     volume_size: 20
#     ami_id: ami-0c02fb55956c7d316
#
# Using data-source-resolved latest AMI:
#   - name: worker
#     instance_type: t3.medium
#     volume_size: 20
#     ami_type: ubuntu
#
# Full entry with all optional fields:
#   - name: data-node
#     instance_type: m5.xlarge
#     volume_size: 50
#     ami_id: ami-0c02fb55956c7d316
#     associate_public_ip: false
#     user_data_file: scripts/data-node.sh
#     additional_volumes:
#       - device_name: /dev/xvdb
#         volume_size: 500
#         volume_type: gp3
# ==============================================================

instances:

  - name: instance-1
    instance_type: t3.micro
    volume_size: 20
    ami_id: ami-xxxxxxxxxxxxxxxxx   # replace with your AMI ID

  - name: instance-2
    instance_type: t3.medium
    volume_size: 30
    ami_id: ami-xxxxxxxxxxxxxxxxx   # replace with your AMI ID

  - name: instance-3
    instance_type: t3.large
    volume_size: 50
    ami_id: ami-xxxxxxxxxxxxxxxxx   # replace with your AMI ID

  - name: instance-4
    instance_type: t3.xlarge
    volume_size: 100
    ami_id: ami-xxxxxxxxxxxxxxxxx   # replace with your AMI ID
